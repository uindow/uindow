name: Release application

on:
    workflow_dispatch:
    push:
        branches:
            - "main"

permissions:
    id-token: write
    contents: read

jobs:
    publish-npm:
        timeout-minutes: 5
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith( github.event.head_commit.message, '[release]' ) }}
        steps:
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Update NPM
              run: npm install -g npm@latest

            - name: Publish to NPM registry
              run: npm publish

    publish-mcp:
        needs: publish-npm
        timeout-minutes: 5
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith( github.event.head_commit.message, '[release]' ) }}
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Publish to MCP Registry
              continue-on-error: true
              run: |
                  set -euo pipefail

                  # (a) Mint a GitHub Actions OIDC token. The registry hardcodes the
                  #     expected audience as "mcp-registry". ACTIONS_ID_TOKEN_REQUEST_*
                  #     are auto-injected because permissions.id-token == write.
                  OIDC_TOKEN=$(curl -sSf \
                    -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                    "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=mcp-registry" | jq -r '.value')

                  # (b) Exchange the OIDC token for a short-lived Registry JWT.
                  #     Endpoint + request field ("oidc_token") confirmed from the
                  #     registry's github_oidc handler. Falls back across known
                  #     response field names if the API renames it.
                  RESP=$(curl -sSf -X POST \
                    "https://registry.modelcontextprotocol.io/v0/auth/github-oidc" \
                    -H "Content-Type: application/json" \
                    -d "{\"oidc_token\":\"$OIDC_TOKEN\"}")
                  REGISTRY_JWT=$(printf '%s' "$RESP" | jq -r '.registry_token // .token // .jwt // empty')
                  if [ -z "$REGISTRY_JWT" ]; then
                    echo "Could not parse registry JWT from auth response:" >&2
                    printf '%s\n' "$RESP" >&2
                    exit 1
                  fi

                  # (c) Publish server.json exactly as written — no client-side transform.
                  curl -sSf -X POST \
                    "https://registry.modelcontextprotocol.io/v0/publish" \
                    -H "Authorization: Bearer $REGISTRY_JWT" \
                    -H "Content-Type: application/json" \
                    --data @server.json

                  echo "Published to MCP Registry."

    build-linux:
        timeout-minutes: 10
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith( github.event.head_commit.message, '[release]' ) }}
        steps:
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Cache node_modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-modules-

            - name: Install dependencies
              run: npm install

            - name: Build & release app (Linux)
              run: npm run build -- --publish always --linux
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}

    build-windows:
        timeout-minutes: 10
        runs-on: windows-latest
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith( github.event.head_commit.message, '[release]' ) }}
        steps:
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Cache node_modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-modules-

            - name: Install dependencies
              run: npm install

            - name: Build & release app (Windows)
              run: npm run build -- --publish always --win
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}

    build-macos:
        timeout-minutes: 10
        runs-on: macos-latest
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith( github.event.head_commit.message, '[release]' ) }}
        steps:
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Cache node_modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-modules-

            - name: Install dependencies
              run: npm install

            - name: Build & release app (MacOS)
              run: npm run build -- --publish always --mac
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
                  CSC_LINK: ${{ secrets.CSC_LINK }}
